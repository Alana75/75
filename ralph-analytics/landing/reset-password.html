<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password — Ralph Analytics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#0d1117;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#161b22;border:1px solid #2a2d3e;border-radius:16px;padding:40px;max-width:420px;width:100%;}
.logo{width:40px;height:40px;background:#E8521A;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;color:#fff;margin-bottom:24px;}
h2{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
p.sub{font-size:.85rem;color:#8b8fa8;margin-bottom:28px;line-height:1.6;}
label{display:block;font-size:.78rem;font-weight:700;color:#8b8fa8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
input{width:100%;padding:11px 14px;background:#0d1117;border:1px solid #2a2d3e;border-radius:8px;color:#e8eaf0;font-size:.9rem;outline:none;font-family:inherit;margin-bottom:16px;}
input:focus{border-color:#E8521A;}
.btn{width:100%;padding:12px;background:#E8521A;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;margin-top:8px;}
.btn:hover{background:#d4451a;}
.msg{padding:12px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none;}
.msg.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80;}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;}
.back{display:block;text-align:center;margin-top:20px;font-size:.82rem;color:#8b8fa8;text-decoration:none;}
.back:hover{color:#E8521A;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.pw-toggle{position:absolute;right:12px;top:11px;background:none;border:none;color:#8b8fa8;cursor:pointer;font-size:.8rem;}
</style></head><body>
<div class="card">
  <div class="logo">R</div>
  <h2 id="card-title">Reset your password</h2>
  <p class="sub" id="card-sub">Enter a new password for your Ralph Analytics account.</p>
  <div class="msg" id="msg"></div>
  <form id="reset-form">
    <label>New Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="At least 8 characters" autocomplete="new-password"/>
      <button type="button" class="pw-toggle" onclick="togglePw('pw')">Show</button>
    </div>
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password"/>
      <button type="button" class="pw-toggle" onclick="togglePw('pw2')">Show</button>
    </div>
    <button class="btn" type="submit" id="submit-btn">Set New Password</button>
  </form>
  <a href="/client" class="back">← Back to login</a>
</div>
<script>
function togglePw(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password';}

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
if (!token) {
  document.getElementById('card-title').textContent = 'Invalid link';
  document.getElementById('card-sub').textContent   = 'This password reset link is missing or invalid. Request a new one from the login page.';
  document.getElementById('reset-form').style.display = 'none';
}

document.getElementById('reset-form').addEventListener('submit', async e => {
  e.preventDefault();
  const pw  = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');
  if (pw.length < 8) { showMsg('Password must be at least 8 characters.','err'); return; }
  if (pw !== pw2)    { showMsg('Passwords do not match.','err'); return; }
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const res = await fetch('/api/auth/reset-password',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pw })
    });
    const data = await res.json();
    if (res.ok) {
      showMsg('Password updated! Redirecting to login...','ok');
      document.getElementById('reset-form').style.display = 'none';
      setTimeout(() => window.location.href = '/client', 2200);
    } else {
      showMsg(data.error || 'Reset failed. The link may have expired.','err');
      btn.disabled = false; btn.textContent = 'Set New Password';
    }
  } catch(err) {
    showMsg('Network error. Please try again.','err');
    btn.disabled = false; btn.textContent = 'Set New Password';
  }
});

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = `msg ${type}`;
  el.style.display = 'block';
}
</script></body></html>
